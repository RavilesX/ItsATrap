name: its_a_trap
description: Atenea's Field — Buscaminas mitológico chibi.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  audioplayers: ^6.1.0
  gal: ^2.3.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
  fonts:
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel-Variable.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  background_color_ios: "#FFF8E1"
  adaptive_icon_background: "#FFF8E1"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
